# .github/workflows/ci.yml
# Runs on every push and pull request to main.
# Book reference: Chapter 12 — CI integration

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ examples/ tests/

      - name: Format check (black)
        run: black --check src/ examples/ tests/

      - name: Type check (mypy)
        run: mypy src/

      - name: Unit tests with coverage
        run: |
          pytest tests/unit/ -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Integration tests
        run: pytest tests/integration/ -v

      - name: Smoke-test research agent
        run: |
          python examples/research_agent/run.py 2>&1 | tee /tmp/research.log
          grep "LOOP PREVENTED" /tmp/research.log
          grep "IDEMPOTENT RETRY HANDLED" /tmp/research.log

      - name: Smoke-test financial agent (default)
        run: python examples/financial_agent/run.py

      - name: Smoke-test financial agent (circuit breaker)
        run: |
          python examples/financial_agent/run.py --demo cb 2>&1 | tee /tmp/fin_cb.log
          grep "CIRCUIT OPEN" /tmp/fin_cb.log
